name: Update Town Data

on:
  push:
    branches: [main]
    paths:
      - 'data/IGPOSTS_USERS_*.json'

jobs:
  fetch-thumbnails:
    name: Fetch new town thumbnails
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch new thumbnails
        run: node scripts/fetch-thumbnails.js

      - name: Commit new thumbnails
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: add new town thumbnails [skip ci]'
          file_pattern: 'images/thumbnails/*.webp'
