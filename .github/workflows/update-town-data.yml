name: Update Town Data

on:
  push:
    branches: [main]
    paths:
      - 'data/IGPOSTS_USERS_*.json'
  workflow_dispatch:  # allows manual trigger from the GitHub Actions UI

jobs:
  fetch-thumbnails:
    name: Fetch new town thumbnails
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill thumbnailShortcode
        run: node scripts/backfill-shortcodes.js

      - name: Fetch new thumbnails
        run: node scripts/fetch-thumbnails.js

      - name: Commit new thumbnails
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: add new town thumbnails [skip ci]'
          file_pattern: 'data/municipalities.json images/thumbnails/*.webp'
