<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://www.googletagmanager.com; style-src 'self' https://unpkg.com https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data: https:; connect-src 'self' https://tile.openstreetmap.org https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; frame-ancestors 'none'; base-uri 'self'">
  <title>Eat Jersey Challenge</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- Font Awesome 6 — brand icons for social platform links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header bar -->
  <header id="site-header">
    <div id="header-left">
      <img src="images/EJCLogo-Transparent.png" alt="Eat Jersey Challenge" id="header-logo">
      <div>
        <h1>Eat Jersey Challenge</h1>
        <p id="subtitle">Exploring New Jersey one town at a time</p>
      </div>
    </div>
    <div id="visit-counter">
      <span id="visited-count">0</span> / <span id="total-count">564</span>
      <span id="counter-label">visited</span>
    </div>
  </header>

  <!-- Map area wrapper (provides positioning context for search + legend) -->
  <div id="map-wrapper">
    <!-- Search drawer -->
    <button id="search-toggle" aria-label="Search towns" aria-expanded="false" aria-controls="search-drawer">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
    <div id="search-drawer" class="search-drawer-closed">
      <div id="search-drawer-header">
        <input type="text" id="search-input" placeholder="Search by town or county…" autocomplete="off">
      </div>
      <ul id="search-results"></ul>
    </div>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Legend -->
    <div id="legend">
    <div id="legend-toggle-row">
      <label class="toggle-switch">
        <input type="checkbox" id="status-detail-toggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Show visit status</span>
    </div>
    <hr class="legend-divider">
    <div class="legend-item">
      <span class="legend-swatch visited-swatch"></span> Visited
    </div>
    <div class="legend-item">
      <span class="legend-swatch unvisited-swatch"></span> Not yet visited
    </div>
    <!-- STATUS LEGEND LABELS: edit the text in the two items below to update legend descriptions -->
    <div class="legend-item legend-detail">
      <span class="legend-swatch queued-swatch"></span> Visited &ndash; post coming soon
    </div>
    <div class="legend-item legend-detail">
      <span class="legend-swatch pre-challenge-swatch"></span> Visited before the challenge began (pre-2023)
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- App JS -->
  <script src="js/config.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
