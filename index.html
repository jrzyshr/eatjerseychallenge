<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eat Jersey Challenge</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- Font Awesome 6 — brand icons for social platform links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header bar -->
  <header id="site-header">
    <div id="header-left">
      <img src="images/EJCLogo-Transparent.png" alt="Eat Jersey Challenge" id="header-logo">
      <div>
        <h1>Eat Jersey Challenge</h1>
        <p id="subtitle">Exploring New Jersey one municipality at a time</p>
      </div>
    </div>
    <div id="visit-counter">
      <span id="visited-count">0</span> / <span id="total-count">564</span>
      <span id="counter-label">visited</span>
    </div>
  </header>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item">
      <span class="legend-swatch visited-swatch"></span> Visited
    </div>
    <div class="legend-item">
      <span class="legend-swatch unvisited-swatch"></span> Not yet visited
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- App JS -->
  <script src="js/map.js"></script>
</body>
</html>
